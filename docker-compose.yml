services:
  postgres:
    image: postgres:16
    container_name: bank-postgres
    environment:
      POSTGRES_DB: bank
      POSTGRES_USER: bank_user
      POSTGRES_PASSWORD: bank_password123
    ports:
      - "5433:5432"
    volumes:
      - bank-postgres-data:/var/lib/postgresql/data

volumes:
  bank-postgres-data: