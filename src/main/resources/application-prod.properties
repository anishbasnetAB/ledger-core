spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
server.port=${PORT:8080}

# Comma-separated origins/patterns allowed to call the API from a browser.
# Default allows any localhost port (local frontend -> deployed backend). For a hosted
# frontend, set CORS_ALLOWED_ORIGINS on Render, e.g. https://your-frontend.vercel.app
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}